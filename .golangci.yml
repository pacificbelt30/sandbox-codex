version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - bodyclose
    - noctx
  settings:
    errcheck:
      check-type-assertions: true
  exclusions:
    rules:
      # Test files: relax errcheck and noctx
      - path: '.*_test\.go$'
        linters:
          - errcheck
          - noctx

formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: true
