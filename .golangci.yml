version: "2"

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - bodyclose
    - noctx
  exclusions:
    rules:
      # Test files: allow errcheck to be relaxed
      - path: "(.+)_test\\.go"
        linters:
          - errcheck
      # Deferred Close() calls: return value commonly ignored (pre-existing pattern)
      - text: "Error return value of `.*Close` is not checked"
        linters:
          - errcheck
      # fmt.Fprintln/Fprintf unchecked: pre-existing in cmd/ps.go
      - text: "Error return value of `fmt\\.F"
        linters:
          - errcheck
      # noctx: pre-existing context-less networking/exec in authproxy, worktree, build
      - path: "internal/authproxy/"
        linters:
          - noctx
      - path: "internal/worktree/"
        linters:
          - noctx
      - path: "cmd/build\\.go"
        linters:
          - noctx
      # staticcheck ST1005: pre-existing capitalized error string in build.go
      - path: "cmd/build\\.go"
        text: "ST1005"
        linters:
          - staticcheck

formatters:
  enable:
    - gofmt

formatters-settings:
  gofmt:
    simplify: true

linters-settings:
  errcheck:
    check-type-assertions: true
