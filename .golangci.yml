linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - misspell
    - gosimple
    - bodyclose
    - noctx

linters-settings:
  gofmt:
    simplify: true
  errcheck:
    check-type-assertions: true

issues:
  exclude-rules:
    # Test files: allow errcheck to be relaxed
    - path: "_test\\.go"
      linters:
        - errcheck
