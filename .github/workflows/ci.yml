name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.5.0
          args: --timeout=5m

      - name: golangci-lint (authproxy)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.5.0
          args: --timeout=5m
          working-directory: authproxy

  # ── Build ───────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        run: go build -v -o codex-dock .

      - name: Verify binary runs
        run: ./codex-dock --help

      - name: Cross-compile (macOS arm64)
        run: GOOS=darwin GOARCH=arm64 go build -o codex-dock-darwin-arm64 .

      - name: Cross-compile (macOS amd64)
        run: GOOS=darwin GOARCH=amd64 go build -o codex-dock-darwin-amd64 .

      - name: Cross-compile (Linux arm64)
        run: GOOS=linux GOARCH=arm64 go build -o codex-dock-linux-arm64 .

  # ── Test ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: |
          go test \
            -race \
            -coverprofile=coverage.out \
            -covermode=atomic \
            ./cmd/... \
            ./internal/sandbox/... \
            ./internal/network/... \
            ./internal/worktree/... \
            ./internal/config/...

      - name: Run tests (authproxy)
        working-directory: authproxy
        run: |
          go test \
            -race \
            -coverprofile=../coverage-authproxy.out \
            -covermode=atomic \
            ./...

      - name: Show coverage summary
        run: go tool cover -func=coverage.out

      - name: Show coverage summary (authproxy)
        run: go tool cover -func=coverage-authproxy.out

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

      - name: Upload coverage report (authproxy)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-authproxy
          path: coverage-authproxy.out
          retention-days: 7

  # ── Vet ─────────────────────────────────────────────────────────────────
  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go vet (authproxy)
        working-directory: authproxy
        run: go vet ./...

      - name: Check go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Check go.mod is tidy (authproxy)
        working-directory: authproxy
        run: |
          go mod tidy
          git diff --exit-code go.mod

  # ── Docker build ─────────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build sandbox image
        uses: docker/build-push-action@v6
        with:
          context: docker
          file: docker/Dockerfile
          push: false
          tags: codex-dock:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
